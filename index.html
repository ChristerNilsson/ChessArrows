<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chess Arrows</title>
    <style>
      :root {
        --bg: #f4efe4;
        --panel: rgba(255, 252, 245, 0.94);
        --line: #c9bea7;
        --text: #2e241a;
        --muted: #6f6254;
        --light: #f0d9b5;
        --dark: #b58863;
        --accent: #1f6f78;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 35%),
          linear-gradient(160deg, #dbcdb3 0%, #efe5d2 48%, #d4c0a1 100%);
      }

      .app {
        width: min(1100px, calc(100vw - 32px));
        margin: 24px auto;
        padding: 24px;
        border: 1px solid rgba(90, 66, 40, 0.14);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 24px 60px rgba(66, 45, 22, 0.18);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 4vw, 44px);
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .lede {
        margin: 0 0 18px;
        color: var(--muted);
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto auto auto;
        gap: 10px;
        margin-bottom: 18px;
      }

      .toolbar input,
      .toolbar button {
        min-height: 44px;
        border-radius: 12px;
        border: 1px solid var(--line);
        font: inherit;
      }

      .toolbar input {
        padding: 0 14px;
        background: rgba(255, 255, 255, 0.84);
      }

      .toolbar button {
        padding: 0 16px;
        cursor: pointer;
        color: white;
        background: var(--accent);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 600px) minmax(260px, 1.2fr);
        gap: 20px;
      }

      .board-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
      }

      .board {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        grid-template-rows: repeat(8, 1fr);
        width: 100%;
        height: 100%;
        aspect-ratio: 1;
        user-select: none;
      }

      .square {
        position: relative;
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        aspect-ratio: 1;
        margin: 0;
        padding: 0;
        border: 0;
        appearance: none;
        -webkit-appearance: none;
        border-radius: 0;
      }

      .piece-img {
        width: 95%;
        height: 95%;
        display: block;
        object-fit: contain;
        pointer-events: none;
      }

      .square.light {
        background: var(--light);
      }

      .square.dark {
        background: var(--dark);
      }

      .square .coord {
        position: absolute;
        font-size: 11px;
        color: rgba(20, 10, 0, 0.58);
        pointer-events: none;
      }

      .square .coord-rank {
        left: 6px;
        top: 50%;
        transform: translateY(-50%);
      }

      .square .coord-file {
        left: 50%;
        bottom: 4px;
        transform: translateX(-50%);
      }

      .square.drag-start {
        outline: 4px solid rgba(31, 111, 120, 0.7);
        outline-offset: -4px;
      }

      .arrows {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .sidepanel {
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .card {
        padding: 16px;
        border: 1px solid rgba(82, 59, 34, 0.12);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .status {
        margin: 0;
        line-height: 1.5;
        white-space: pre-line;
      }

      .path {
        margin: 0;
        font-variant-ligatures: none;
        font-size: 15px;
      }

      .tree-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .tree-cell {
        padding: 2px 14px 2px 0;
        vertical-align: top;
        white-space: nowrap;
      }

      .tree-node {
        display: inline-block;
        cursor: pointer;
      }

      .tree-card {
        background: rgba(122, 122, 122, 0.92);
      }

      .tree-white {
        color: #ffffff;
      }

      .tree-black {
        color: #111111;
      }

      .tree-current {
        color: #8fe388;
        font-weight: 700;
      }

      .nav-pad {
        display: grid;
        grid-template-columns: repeat(3, 52px);
        grid-template-rows: repeat(2, 52px);
        gap: 8px;
        justify-content: center;
        margin-top: 12px;
      }

      .nav-btn {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.85);
        color: var(--text);
        font-size: 24px;
        line-height: 1;
        cursor: pointer;
      }

      .nav-left {
        grid-column: 1;
        grid-row: 1;
      }

      .nav-up {
        grid-column: 2;
        grid-row: 1;
      }

      .nav-right {
        grid-column: 3;
        grid-row: 1;
      }

      .nav-down {
        grid-column: 2;
        grid-row: 2;
      }

      @media (max-width: 840px) {
        .toolbar {
          grid-template-columns: 1fr auto auto;
        }

        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Chess Arrows</h1>
      <section class="toolbar">
        <input id="fen-input" type="text" spellcheck="false" />
        <button id="load-fen" type="button">Ladda FEN</button>
        <button id="accept-position" type="button">Acceptera aktuell</button>
        <button id="reset-tree" type="button">Rensa</button>
      </section>

      <section class="layout">
        <div class="board-wrap">
          <div id="board" class="board" aria-label="Schackbräde"></div>
          <svg id="arrows" class="arrows" viewBox="0 0 800 800" preserveAspectRatio="none"></svg>
        </div>

        <aside class="sidepanel">
          <section class="card tree-card">
            <div id="path" class="path"></div>
          </section>

        </aside>
      </section>
    </main>

    <script src="./sketch.js"></script>
  </body>
</html>
