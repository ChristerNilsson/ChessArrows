<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chess Arrows</title>
    <style>
      :root {
        --bg: #f4efe4;
        --panel: rgba(255, 252, 245, 0.94);
        --line: #c9bea7;
        --text: #2e241a;
        --muted: #6f6254;
        --light: #f0d9b5;
        --dark: #b58863;
        --accent: #1f6f78;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 35%),
          linear-gradient(160deg, #dbcdb3 0%, #efe5d2 48%, #d4c0a1 100%);
      }

      .app {
        width: min(1100px, calc(100vw - 32px));
        margin: 24px auto;
        padding: 24px;
        border: 1px solid rgba(90, 66, 40, 0.14);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 24px 60px rgba(66, 45, 22, 0.18);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 4vw, 44px);
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .lede {
        margin: 0 0 18px;
        color: var(--muted);
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto auto auto;
        gap: 10px;
        margin-bottom: 18px;
      }

      .toolbar input,
      .toolbar button {
        min-height: 44px;
        border-radius: 12px;
        border: 1px solid var(--line);
        font: inherit;
      }

      .toolbar input {
        padding: 0 14px;
        background: rgba(255, 255, 255, 0.84);
      }

      .toolbar button {
        padding: 0 16px;
        cursor: pointer;
        color: white;
        background: var(--accent);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 600px) minmax(260px, 1.2fr);
        gap: 20px;
      }

      .board-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
      }

      .board {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        grid-template-rows: repeat(8, 1fr);
        width: 100%;
        height: 100%;
        aspect-ratio: 1;
        user-select: none;
      }

      .square {
        position: relative;
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        aspect-ratio: 1;
        margin: 0;
        padding: 0;
        border: 0;
        appearance: none;
        -webkit-appearance: none;
        border-radius: 0;
        font-size: clamp(34px, 6vw, 70px);
        line-height: 1;
      }

      .square.light {
        background: var(--light);
      }

      .square.dark {
        background: var(--dark);
      }

      .square .coord {
        position: absolute;
        font-size: 11px;
        color: rgba(20, 10, 0, 0.58);
        pointer-events: none;
      }

      .square .coord-rank {
        left: 6px;
        top: 50%;
        transform: translateY(-50%);
      }

      .square .coord-file {
        left: 50%;
        bottom: 4px;
        transform: translateX(-50%);
      }

      .square.drag-start {
        outline: 4px solid rgba(31, 111, 120, 0.7);
        outline-offset: -4px;
      }

      .arrows {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .sidepanel {
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .card {
        padding: 16px;
        border: 1px solid rgba(82, 59, 34, 0.12);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .status {
        margin: 0;
        line-height: 1.5;
        white-space: pre-line;
      }

      .path {
        margin: 0;
        font-variant-ligatures: none;
        font-size: 15px;
      }

      .tree-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .tree-cell {
        padding: 2px 14px 2px 0;
        vertical-align: top;
        white-space: nowrap;
      }

      .tree-node {
        display: inline-block;
      }

      .tree-card {
        background: rgba(122, 122, 122, 0.92);
      }

      .tree-white {
        color: #ffffff;
      }

      .tree-black {
        color: #111111;
      }

      .tree-current {
        color: #8fe388;
        font-weight: 700;
      }

      .legend {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
      }

      @media (max-width: 840px) {
        .toolbar {
          grid-template-columns: 1fr 1fr;
        }

        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Chess Arrows</h1>
      <section class="toolbar">
        <input id="fen-input" type="text" spellcheck="false" />
        <button id="load-fen" type="button">Ladda FEN</button>
        <button id="accept-node" type="button">Acceptera ställning</button>
        <button id="reset-tree" type="button">Rensa</button>
      </section>

      <section class="layout">
        <div class="board-wrap">
          <div id="board" class="board" aria-label="Schackbräde"></div>
          <svg id="arrows" class="arrows" viewBox="0 0 800 800" preserveAspectRatio="none">
            <defs>
              <marker id="arrow-white" markerWidth="22" markerHeight="25" refX="0" refY="12.5" orient="auto" markerUnits="userSpaceOnUse">
                <path d="M0,0 L21.65,12.5 L0,25 z" fill="#f7f7f7"></path>
              </marker>
              <marker id="arrow-black" markerWidth="22" markerHeight="25" refX="0" refY="12.5" orient="auto" markerUnits="userSpaceOnUse">
                <path d="M0,0 L21.65,12.5 L0,25 z" fill="#232323"></path>
              </marker>
              <marker id="arrow-preview" markerWidth="22" markerHeight="25" refX="0" refY="12.5" orient="auto" markerUnits="userSpaceOnUse">
                <path d="M0,0 L21.65,12.5 L0,25 z" fill="#1f6f78"></path>
              </marker>
            </defs>
          </svg>
        </div>

        <aside class="sidepanel">
          <section class="card tree-card">
            <div id="path" class="path"></div>
          </section>

          <section class="card">
            <h2>Drag</h2>
            <p class="legend">Dra med vänster musknapp från startrutan till målrutan för att mata in ett drag.</p>
          </section>

          <section class="card">
            <h2>Styrning</h2>
            <p class="legend">⬅️ går till förra draget.<br />➡️ går till nästa drag.<br />⬆️ och ⬇️ växlar mellan alternativa drag.</p>
          </section>
        </aside>
      </section>
    </main>

    <script src="./sketch.js"></script>
  </body>
</html>
